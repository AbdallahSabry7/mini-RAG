services:
  mongodb:
    image: mongo:8.0

    container_name: mongodb

    ports:
      - "27007:27017"

    volumes:
      - mongodata:/data/db

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}

    networks:
      - backend

    restart: always

networks:
  backend:

volumes:
  mongodata:
  
    